# Verana Trust Resolver
#
# Usage:
#   cd docker && docker compose up -d
#   cd docker && docker compose down          # stop
#   cd docker && docker compose down -v       # stop + delete volumes

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: verana
      POSTGRES_PASSWORD: verana
      POSTGRES_DB: verana_resolver
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verana -d verana_resolver"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  resolver:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: verana
      POSTGRES_PASSWORD: verana
      POSTGRES_DB: verana_resolver
      REDIS_URL: redis://redis:6379
      INDEXER_API: ${INDEXER_API:-https://idx.devnet.verana.network}
      ECS_ECOSYSTEM_DIDS: ${ECS_ECOSYSTEM_DIDS:-did:web:ecosystem1.example.com}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      INSTANCE_ROLE: ${INSTANCE_ROLE:-leader}
      ENABLE_POLLING: ${ENABLE_POLLING:-true}
      INJECT_DID_ENDPOINT_ENABLED: ${INJECT_DID_ENDPOINT_ENABLED:-true}
      DISABLE_DIGEST_SRI_VERIFICATION: ${DISABLE_DIGEST_SRI_VERIFICATION:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
